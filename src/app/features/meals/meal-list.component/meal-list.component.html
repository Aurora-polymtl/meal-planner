<div class="app-container">
  <div class="page-header">
    <div>
      <h1>Mes repas</h1>
      <p>Ajoute, consulte et modifie tes repas enregistrés.</p>
    </div>

    @if (!showForm) {
      <button class="primary-button" type="button" (click)="openForm()">
        Ajouter un plat
      </button>
    }
  </div>

  @if (showForm) {
    <app-meal-form
      (close)="closeForm()"
      (saved)="onMealSaved()"
    />
  }

  <div class="meals-list">
    @for (meal of meals; track meal.id) {
      <article class="meal-card" (click)="openDetails(meal)">
        <div class="meal-info">
          <strong>{{ meal.name }}</strong>

          <div class="meal-categories">
            @for (c of meal.categories; track c) {
              <span class="category-chip-display">{{ c }}</span>
            }
          </div>
        </div>

        <button
          class="delete-button"
          type="button"
          aria-label="Supprimer le repas"
          (click)="deleteMeal(meal.id); $event.stopPropagation()"
        >
          ×
        </button>
      </article>
    }
  </div>

  @if (selectedMeal) {
    <app-meal-detail
      [meal]="selectedMeal"
      (close)="closeDetails()"
      (updated)="onMealUpdated()"
    />
  }
</div>
