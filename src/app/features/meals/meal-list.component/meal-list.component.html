<div class="app-container">
  <div class="page-header">
    <div>
      <h1>Mes repas</h1>
      <p>Ajoute, consulte et modifie tes repas enregistrés.</p>
    </div>

    @if (!showForm) {
      <button class="primary-button" type="button" (click)="openForm()">Ajouter un plat</button>
    }
  </div>

  @if (showForm) {
    <app-meal-form
      [availableCategories]="categories"
      (close)="closeForm()"
      (saved)="onMealSaved()"
    />
  }

  <section class="filters-section">
    <div class="filter-section">
      <label for="category-filter">Filtrer par catégorie</label>

      <select id="category-filter" [(ngModel)]="selectedCategoryFilter">
        <option value="">Toutes les catégories</option>

        @for (category of categories; track category.name) {
          <option [value]="category.name">{{ category.name }}</option>
        }
      </select>
    </div>

    <div class="filter-section">
      <label for="usage-filter">Filtrer par utilisation</label>

      <select id="usage-filter" [(ngModel)]="selectedMealUsageFilter">
        <option value="">Toutes les utilisations</option>
        <option value="dinner">Dîners disponibles</option>
        <option value="supper">Soupers disponibles</option>
        <option value="both">Dîner et souper seulement</option>
      </select>
    </div>
  </section>

  <div class="meals-list">
    @for (meal of filteredMeals; track meal.id) {
      <article class="meal-card" (click)="openDetails(meal)">
        <div class="meal-info">
          <strong>{{ meal.name }}</strong>

          <div class="meal-categories">
            @for (c of meal.categories; track c) {
              <span class="category-chip-display">{{ c }}</span>
            }
          </div>
        </div>

        <button
          class="delete-button"
          type="button"
          aria-label="Supprimer le repas"
          (click)="deleteMeal(meal.id); $event.stopPropagation()"
        >
          ×
        </button>
      </article>
    } @empty {
      <p class="empty-message">Aucun repas ne correspond au filtre sélectionné.</p>
    }
  </div>

  @if (selectedMeal) {
    <app-meal-detail
      [meal]="selectedMeal"
      [availableCategories]="categories"
      (close)="closeDetails()"
      (updated)="onMealUpdated()"
    />
  }
</div>
