<h1>Mes repas</h1>

<form (ngSubmit)="addMeal()">
  <input
    type="text"
    name="name"
    [(ngModel)]="name"
    placeholder="Nom du repas"
  />

  <input
    type="text"
    name="category"
    [(ngModel)]="category"
    placeholder="Catégorie"
  />

  <button type="submit">
    Ajouter
  </button>
</form>

<hr />

@for (meal of meals; track meal.id) {
  <div style="margin-bottom: 10px;">
    <p>
      <strong>{{ meal.name }}</strong> - {{ meal.category }}
    </p>

    <button (click)="deleteMeal(meal.id)">
      Supprimer
    </button>
  </div>
}
