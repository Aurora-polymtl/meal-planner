<h1>Mes repas</h1>

<!-- FORMULAIRE -->
<div style="margin-bottom: 20px;">

  <!-- NOM -->
  <input
    type="text"
    [(ngModel)]="name"
    placeholder="Nom du repas"
    name="name"
  />
  <div style="color: red; font-size: 12px;">
    {{ errors.name }}
  </div>

  <br />

  <!-- CATEGORIE -->
  <input
    type="text"
    [(ngModel)]="category"
    placeholder="Catégorie"
    name="category"
  />
  <div style="color: red; font-size: 12px;">
    {{ errors.category }}
  </div>

  <br />

  <button (click)="addMeal()">
    Ajouter
  </button>
</div>

<hr />

<!-- LISTE -->
@for (meal of meals; track meal.id) {
  <div style="margin-bottom: 10px;">
    <p>
      <strong>{{ meal.name }}</strong> - {{ meal.category }}
    </p>

    <button (click)="deleteMeal(meal.id)">
      Supprimer
    </button>
  </div>
}
