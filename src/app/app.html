<div class="top-bar">
  <div class="tabs">
    <button class="tab" [class.active]="tab === 'categories'" (click)="tab = 'categories'">
      Catégories
    </button>
    <button class="tab" [class.active]="tab === 'meals'" (click)="tab = 'meals'">Mes repas</button>

    <button class="tab" [class.active]="tab === 'planner'" (click)="tab = 'planner'">
      Planification
    </button>
  </div>

  <button class="logout-button" (click)="logout()" [disabled]="isLoggingOut">Déconnexion</button>
</div>

@if (tab === 'meals') {
  <app-meal-list />
}

@if (tab === 'planner') {
  <app-planner />
}

@if (tab === 'categories') {
  <app-category-manager />
}
