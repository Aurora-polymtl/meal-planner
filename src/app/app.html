<div class="tabs">

  <button
    class="tab"
    [class.active]="tab === 'meals'"
    (click)="tab = 'meals'"
  >
    Mes repas
  </button>

  <button
    class="tab"
    [class.active]="tab === 'planner'"
    (click)="tab = 'planner'"
  >
    Planification
  </button>

</div>

@if (tab === 'meals') {
  <app-meal-list />
}

@if (tab === 'planner') {
  <app-planner />
}
